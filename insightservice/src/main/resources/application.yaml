server:
  port: 8086

spring:
  application:
    name: insightservice
  ai:
    ollama:
      init:
        timeout: 5m
      base-url: http://localhost:11434
      chat:
        model: gemma3:4b
        temperature: 0.7
        num-predict: 500
        num-ctx: 2048

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: WHEN_AUTHORIZED
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

usage:
  service:
    url: http://localhost:8084/api/v1/usage

logging:
  level:
    com.paul.insightservice: DEBUG
    org.springframework.ai: DEBUG