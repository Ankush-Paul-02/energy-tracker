server:
  port: 8081
spring:
  application:
    name: userservice
  datasource:
    url: jdbc:postgresql://localhost:5432/energy_tracker
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
      format_sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/energy_tracker
    user: root
    password: root
    locations: classpath:db/migration
    baseline-on-migrate: true